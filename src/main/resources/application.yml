spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:3306/fmsv_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      # Not read-only: the app writes ONLY to report_monthly_summary (the DB grant
      # keeps it read-only on transactions and everything else).
      read-only: false
      maximum-pool-size: 5
      connection-timeout: 10000
  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: false

txreport:
  default-zone: Asia/Bangkok
  # Signing transactions counted in reports: PDFsign=1, XMLsign=4, JsonSign=14
  signing-function-ids: 1,4,14
  fonts:
    noto: ${FONT_NOTO:}
    tahoma: ${FONT_TAHOMA:/mnt/c/Windows/Fonts/tahoma.ttf}
    sarabun: ${FONT_SARABUN:}
  orgs:
    - org-id: "0994000164891"
      display-name: "Government Saving Bank"
      gateway-id: "TIPxGSBTest01"
    - org-id: "0107537000882"
      display-name: "Krung Thai Bank"
      gateway-id: "KTBTest01"
    - org-id: "0994000953534"
      display-name: "TMC"
    - org-id: "0107556000051"
      display-name: "DHIP"
      gateway-id: "DhipTest01"
  # Billing (tiers, minimum fee, fixed fee, waive) is configured per org in the
  # Billing Engine: src/main/resources/billing/org-billing-config.json

logging:
  level:
    com.tdid.txreport: DEBUG
    com.openhtmltopdf: WARN
